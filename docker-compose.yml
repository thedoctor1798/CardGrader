services:
  cardgrader-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cardgrader-backend
    restart: unless-stopped
    user: "${CARDGRADER_UID:-1000}:${CARDGRADER_GID:-1000}"
    environment:
      APP_MODE: "${APP_MODE:-server}"
      HOST: "0.0.0.0"
      PORT: "8710"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////app/data/cardgrader.db}"
      DATA_DIR: "${DATA_DIR:-/app/data}"
      MEDIA_DIR: "${MEDIA_DIR:-/app/media}"
      CATALOG_DIR: "${CATALOG_DIR:-/app/catalog}"
      LOG_DIR: "${LOG_DIR:-/app/logs}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8711,http://127.0.0.1:8711}"
      LOCAL_AI_MODE: "${LOCAL_AI_MODE:-remote_worker}"
      LOCAL_AI_WORKER_BASE_URL: "${LOCAL_AI_WORKER_BASE_URL:-http://YOUR-WINDOWS-TAILSCALE-IP:8765}"
      LOCAL_AI_TIMEOUT_SECONDS: "${LOCAL_AI_TIMEOUT_SECONDS:-300}"
      LOCAL_AI_MAX_IMAGES: "${LOCAL_AI_MAX_IMAGES:-8}"
      LOCAL_AI_MAX_TOKENS: "${LOCAL_AI_MAX_TOKENS:-4096}"
      LOCAL_AI_DISABLE_THINKING: "${LOCAL_AI_DISABLE_THINKING:-true}"
      LOCAL_AI_MODEL_NAME: "${LOCAL_AI_MODEL_NAME:-}"
      AI_WORKER_SHARED_TOKEN: "${AI_WORKER_SHARED_TOKEN:-}"
      CARD_RECOGNITION_TOP_K: "${CARD_RECOGNITION_TOP_K:-10}"
      CARD_RECOGNITION_MIN_SCORE: "${CARD_RECOGNITION_MIN_SCORE:-30}"
      PRICE_FETCH_ENABLED: "${PRICE_FETCH_ENABLED:-true}"
      PRICE_REFRESH_ENABLED: "${PRICE_REFRESH_ENABLED:-false}"
      PRICE_REFRESH_INTERVAL_HOURS: "${PRICE_REFRESH_INTERVAL_HOURS:-24}"
      PRICE_DEFAULT_CURRENCY: "${PRICE_DEFAULT_CURRENCY:-HUF}"
      PRICE_RATE_LIMIT_SECONDS: "${PRICE_RATE_LIMIT_SECONDS:-3}"
      PRICE_REQUEST_TIMEOUT_SECONDS: "${PRICE_REQUEST_TIMEOUT_SECONDS:-30}"
      PRICE_SOURCES: "${PRICE_SOURCES:-manual,local_json,poketrace,tcgdex,pokemontcg}"
      PRICE_FETCH_AFTER_RECOGNITION: "${PRICE_FETCH_AFTER_RECOGNITION:-false}"
      PRICE_FX_EUR_HUF: "${PRICE_FX_EUR_HUF:-}"
      PRICE_FX_USD_HUF: "${PRICE_FX_USD_HUF:-}"
      FX_CONVERSION_ENABLED: "${FX_CONVERSION_ENABLED:-true}"
      FX_DEFAULT_TARGET_CURRENCY: "${FX_DEFAULT_TARGET_CURRENCY:-HUF}"
      FX_PROVIDER: "${FX_PROVIDER:-frankfurter}"
      FX_PROVIDER_BASE_URL: "${FX_PROVIDER_BASE_URL:-https://api.frankfurter.dev/v2}"
      FX_PROVIDER_FALLBACK_BASE_URL: "${FX_PROVIDER_FALLBACK_BASE_URL:-https://api.frankfurter.dev/v1}"
      FX_USER_AGENT: "${FX_USER_AGENT:-CardGrader/1.0}"
      FX_CACHE_TTL_HOURS: "${FX_CACHE_TTL_HOURS:-12}"
      FX_TIMEOUT_SECONDS: "${FX_TIMEOUT_SECONDS:-15}"
      FX_FALLBACK_TO_STATIC_RATES: "${FX_FALLBACK_TO_STATIC_RATES:-true}"
      PRICE_PROVIDER_CACHE_TTL_HOURS: "${PRICE_PROVIDER_CACHE_TTL_HOURS:-24}"
      PRICE_EXTERNAL_FETCH_ENABLED: "${PRICE_EXTERNAL_FETCH_ENABLED:-true}"
      PRICE_PROVIDER_MIN_MATCH_SCORE: "${PRICE_PROVIDER_MIN_MATCH_SCORE:-70}"
      CONFIG_ENCRYPTION_KEY: "${CONFIG_ENCRYPTION_KEY:-}"
      ALLOW_UNENCRYPTED_PROVIDER_SECRETS: "${ALLOW_UNENCRYPTED_PROVIDER_SECRETS:-false}"
      POKETRACE_ENABLED: "${POKETRACE_ENABLED:-false}"
      POKETRACE_API_KEY: "${POKETRACE_API_KEY:-}"
      POKETRACE_BASE_URL: "${POKETRACE_BASE_URL:-https://api.poketrace.com/v1}"
      POKETRACE_MARKET: "${POKETRACE_MARKET:-US}"
      POKETRACE_PLAN: "${POKETRACE_PLAN:-free}"
      POKETRACE_DAILY_LIMIT: "${POKETRACE_DAILY_LIMIT:-250}"
      POKETRACE_BURST_LIMIT: "${POKETRACE_BURST_LIMIT:-1}"
      POKETRACE_BURST_WINDOW_SECONDS: "${POKETRACE_BURST_WINDOW_SECONDS:-2}"
      POKETRACE_TIMEOUT_SECONDS: "${POKETRACE_TIMEOUT_SECONDS:-30}"
      POKETRACE_CACHE_TTL_HOURS: "${POKETRACE_CACHE_TTL_HOURS:-24}"
      POKETRACE_MIN_MATCH_SCORE: "${POKETRACE_MIN_MATCH_SCORE:-70}"
      POKETRACE_FETCH_HISTORY: "${POKETRACE_FETCH_HISTORY:-false}"
      POKETRACE_HISTORY_PERIOD: "${POKETRACE_HISTORY_PERIOD:-30d}"
      POKETRACE_RESPECT_RETRY_AFTER: "${POKETRACE_RESPECT_RETRY_AFTER:-true}"
      TCGDEX_ENABLED: "${TCGDEX_ENABLED:-false}"
      TCGDEX_BASE_URL: "${TCGDEX_BASE_URL:-https://api.tcgdex.net/v2}"
      TCGDEX_TIMEOUT_SECONDS: "${TCGDEX_TIMEOUT_SECONDS:-30}"
      TCGDEX_RATE_LIMIT_SECONDS: "${TCGDEX_RATE_LIMIT_SECONDS:-2}"
      TCGDEX_MIN_MATCH_SCORE: "${TCGDEX_MIN_MATCH_SCORE:-70}"
      POKEMONTCG_ENABLED: "${POKEMONTCG_ENABLED:-false}"
      POKEMONTCG_API_KEY: "${POKEMONTCG_API_KEY:-}"
      POKEMONTCG_BASE_URL: "${POKEMONTCG_BASE_URL:-https://api.pokemontcg.io/v2}"
      POKEMONTCG_TIMEOUT_SECONDS: "${POKEMONTCG_TIMEOUT_SECONDS:-30}"
      POKEMONTCG_RATE_LIMIT_SECONDS: "${POKEMONTCG_RATE_LIMIT_SECONDS:-2}"
      POKEMONTCG_MIN_MATCH_SCORE: "${POKEMONTCG_MIN_MATCH_SCORE:-70}"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ./catalog:/app/catalog
      - ./logs:/app/logs
    expose:
      - "8710"
    ports:
      - "${BACKEND_PORT:-8710}:8710"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8710/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cardgrader-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    container_name: cardgrader-frontend
    restart: unless-stopped
    depends_on:
      cardgrader-backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8711}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
